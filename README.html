<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Fire Diamond Generator - Test</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #2d2d2d;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.5);
            text-align: center;
            width: 350px;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #ff4500;
            text-transform: uppercase;
            border: 2px solid #ff4500;
            padding: 10px;
            margin-bottom: 20px;
            display: inline-block;
        }
        h1 {
            font-size: 20px;
            margin-bottom: 20px;
        }
        input[type="number"] {
            width: 80%;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
            border: none;
            outline: none;
            text-align: center;
        }
        .btn {
            background-color: #ff4500;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #e63e00;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">
            Free Fire <br> Free Diamond
        </div>

        <h1>FREE DIAMOND</h1>

        <p>Enter Amount (Max 10000):</p>
        <input type="number" id="diamondInput" placeholder="Eg. 5000" min="1" max="10000">

        <br>

        <a href="f.html" class="btn" onclick="return validateInput()">Claim Now</a>
    </div>

    <script>
        function validateInput() {
            var val = document.getElementById('diamondInput').value;
            if (val === "" || val <= 0) {
                alert("Please enter a valid number!");
                return false;
            }
            if (val > 10000) {
                alert("Maximum limit is 10000 diamonds!");
                return false;
            }
            return true;
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gopal's Education Hub</title>
    <style>
        /* Basic Styling */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .tagline {
            font-style: italic;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        /* Buttons Styling */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .subject-btn {
            padding: 15px 25px;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
            display: block;
            border: none;
            cursor: pointer;
        }

        /* Subject Colors */
        .physics { background: #3498db; }
        .chemistry { background: #f39c12; }
        .maths { background: #27ae60; }

        /* Hover Effects */
        .subject-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            filter: brightness(1.1);
        }

        footer {
            margin-top: 30px;
            font-size: 0.8rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h1>GOPAL</h1>
        <p class="tagline">Digital Study Material</p>

        <div class="btn-container">
            <a href="physics.pdf" class="subject-btn physics">Physics Notes</a>
            <a href="chemistry.pdf" class="subject-btn chemistry">Chemistry Notes</a>
            <a href="maths.pdf" class="subject-btn maths">Maths Notes</a>
        </div>

        <footer>Created by Gopal &copy; 2026</footer>
    </div>

</body>
</html>
